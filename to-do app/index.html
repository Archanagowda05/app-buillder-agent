<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Task Manager</h1>
    </header>
    <div class="container">
        <form id="task-form" class="task-form">
            <input type="hidden" id="task-id" />
            <div class="form-group">
                <label for="task-name">Task Name</label>
                <input type="text" id="task-name" required />
            </div>
            <div class="form-group">
                <label for="task-due">Due Date</label>
                <input type="date" id="task-due" required />
            </div>
            <div class="form-group">
                <label for="task-priority">Priority</label>
                <select id="task-priority" required>
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            <div class="form-actions" style="align-self: end;">
                <button type="submit" id="submit-btn" class="btn btn-primary">Add Task</button>
            </div>
        </form>
        <table id="task-table" class="task-table">
            <thead>
                <tr>
                    <th>Task Name</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Tasks will be injected here -->
            </tbody>
        </table>
    </div>

    <script>
        (function () {
            const form = document.getElementById('task-form');
            const taskIdInput = document.getElementById('task-id');
            const nameInput = document.getElementById('task-name');
            const dueInput = document.getElementById('task-due');
            const prioritySelect = document.getElementById('task-priority');
            const submitBtn = document.getElementById('submit-btn');
            const tbody = document.querySelector('#task-table tbody');

            let tasks = [];

            // Load tasks from localStorage if available
            const stored = localStorage.getItem('tasks');
            if (stored) {
                try { tasks = JSON.parse(stored); } catch (e) { tasks = []; }
            }

            function saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(tasks));
            }

            function render() {
                tbody.innerHTML = '';
                tasks.forEach(task => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${escapeHtml(task.name)}</td>
                        <td>${task.dueDate}</td>
                        <td>${escapeHtml(task.priority)}</td>
                        <td>
                            <button class="action-btn edit" data-id="${task.id}">Edit</button>
                            <button class="action-btn delete" data-id="${task.id}">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            function escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return String(text).replace(/[&<>\"']/g, function(m) { return map[m]; });
            }

            function resetForm() {
                taskIdInput.value = '';
                nameInput.value = '';
                dueInput.value = '';
                prioritySelect.value = 'Medium';
                submitBtn.textContent = 'Add Task';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                const id = taskIdInput.value;
                const name = nameInput.value.trim();
                const dueDate = dueInput.value;
                const priority = prioritySelect.value;

                if (!name || !dueDate) return;

                if (id) {
                    // Update existing task
                    const idx = tasks.findIndex(t => t.id === id);
                    if (idx > -1) {
                        tasks[idx] = { id, name, dueDate, priority };
                    }
                } else {
                    // Add new task
                    const newTask = {
                        id: Date.now().toString(),
                        name,
                        dueDate,
                        priority
                    };
                    tasks.push(newTask);
                }
                saveTasks();
                render();
                resetForm();
            });

            tbody.addEventListener('click', function (e) {
                const target = e.target;
                if (target.matches('button.edit')) {
                    const id = target.dataset.id;
                    const task = tasks.find(t => t.id === id);
                    if (task) {
                        taskIdInput.value = task.id;
                        nameInput.value = task.name;
                        dueInput.value = task.dueDate;
                        prioritySelect.value = task.priority;
                        submitBtn.textContent = 'Update Task';
                    }
                } else if (target.matches('button.delete')) {
                    const id = target.dataset.id;
                    if (confirm('Are you sure you want to delete this task?')) {
                        tasks = tasks.filter(t => t.id !== id);
                        saveTasks();
                        render();
                        // If we were editing this task, reset form
                        if (taskIdInput.value === id) resetForm();
                    }
                }
            });

            // Initial render
            render();
        })();
    </script>
</body>
</html>
